<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | ParentConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="app-shell compact-page">
    <section class="glass-card simple-panel wide">
      <p class="eyebrow">Future Faculty Dashboard</p>
      <h1>ParentConnect Dashboard</h1>
      <p class="subtitle">Attendance analytics, student records, and parent alert monitoring will be added in future phases.</p>

      <div class="dashboard-preview" aria-label="Dashboard preview cards">
                  <article>
                      <span>Total Students</span>
                      <strong id="totalStudents">--</strong>
                  </article>

                  <article>
                      <span>Present</span>
                      <strong id="presentStudents">--</strong>
                  </article>

                  <article>
                      <span>Absent</span>
                      <strong id="absentStudents">--</strong>
                  </article>

                  <article>
                      <span>Parents Notified Today</span>
                      <strong id="alertsSent">--</strong>
                  </article>
                  
      </div>
      <div class="filter-container">

    <button id="allBtn">
        All
    </button>

    <button id="presentBtn">
        Present
    </button>

    <button id="absentBtn">
        Absent
    </button>
    <button id="exportBtn">

    📥 Export Attendance CSV

</button>

</div>
      <div class="search-container">

    <input
        type="text"
        id="searchInput"
        placeholder="Search Roll Number..."
    >

</div>
      <section class="student-table-section">

    <h2>Today's Attendance</h2>

    <table id="studentTable">

        <thead>

            <tr>

                <th>Roll Number</th>

                <th>Name</th>

                <th>Status</th>

                <th>Time</th>

            </tr>

        </thead>

        <tbody id="studentTableBody">

        </tbody>

    </table>

</section>
      <!-- <section class="notification-section">

    <h2>Notification History</h2>

    <table>

        <thead>

            <tr>

                <th>Date & Time</th>
                <th>Type</th>
                <th>Roll Number</th>
                <th>Name</th>
                <th>Status</th>

            </tr>

        </thead>

        <tbody id="notificationTableBody">

        </tbody>

    </table>

</section> -->
      <button class="secondary-button" id="logoutBtn">Logout
</button>
    </section>
    
  </main>
  <script src="js/dashboard.js"></script>
</body>
</html>
