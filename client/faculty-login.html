<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faculty Login | ParentConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="app-shell compact-page">
    <section class="glass-card simple-panel">
      <div class="logo-frame small" aria-label="Pallavi Engineering College logo">
        <img src="images/palv_college_logo.png" alt="Pallavi Engineering College logo">
      </div>
      <p class="college-name">PALLAVI ENGINEERING COLLEGE</p>
      <h1>Faculty Login</h1>
      <p class="subtitle">Faculty authentication will be implemented in the backend phase.</p>

      <form class="stacked-form" novalidate>
        <label class="field-group" for="facultyId">
          <span>Faculty ID</span>
          <input id="facultyId" type="text" placeholder="Enter faculty ID" disabled>
        </label>
        <label class="field-group" for="facultyPassword">
          <span>Password</span>
          <input id="facultyPassword" type="password" placeholder="Backend integration pending" disabled>
        </label>
        <button class="primary-button" type="button" disabled>Login Pending</button>
      </form>

      <a class="secondary-button" href="index.html">Back to Attendance</a>
    </section>
  </main>
</body>
</html>
